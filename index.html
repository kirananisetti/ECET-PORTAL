<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELURU COLLEGE OF ENGINEERING AND TECHNOLOGY</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }

        input, select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #fcb69f;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #f58a6e;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
    <script>
        // Fetching results from JSON
        async function fetchResults(rollNumber) {
            const response = await fetch('data.json');
            const data = await response.json();
            return data.filter(record => record.roll_number === rollNumber);
        }

        // Display results dynamically
        async function handleSubmit(event) {
            event.preventDefault();

            const rollNumber = document.getElementById('roll-number').value.toUpperCase();
            const results = await fetchResults(rollNumber);

            if (results.length > 0) {
                let resultsHTML = `<div style="text-align: center; margin-top: 50px;">
                    <h2>Results</h2>
                    <p><strong>Roll Number:</strong> ${rollNumber}</p>
                    <table border="1" style="margin: 0 auto; border-collapse: collapse; width: 80%;">
                        <tr>
                            <th>Subject Code</th>
                            <th>Subject Name</th>
                            <th>Internals</th>
                            <th>Grade</th>
                            <th>Credits</th>
                        </tr>`;

                results.forEach(record => {
                    resultsHTML += `
                        <tr>
                            <td>${record.subject_code}</td>
                            <td>${record.subject_name}</td>
                            <td>${record.internals}</td>
                            <td>${record.grade}</td>
                            <td>${record.credits}</td>
                        </tr>`;
                });

                resultsHTML += `</table><button onclick="window.location.reload()">Go Back</button></div>`;
                document.body.innerHTML = resultsHTML;
            } else {
                alert('No results found for the given Roll Number.');
            }
        }
    </script>
</head>
<body>
    <h1>ECET-PORTAL</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" oninput="this.value = this.value.toUpperCase();" required><br>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>
</body>
</html>
