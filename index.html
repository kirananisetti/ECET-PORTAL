<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET-PORTAL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }

        input, select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #fcb69f;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #f58a6e;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f58a6e;
            color: white;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
    <script>
        async function handleSubmit(event) {
            event.preventDefault(); // Prevent page reload
            const rollNumber = document.getElementById('roll-number').value.toUpperCase();
            const year = document.getElementById('year').value;
            const semester = document.getElementById('semester').value;

            // Fetch data from the backend
            const response = await fetch('backend.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rollNumber, year, semester })
            });

            if (response.ok) {
                const results = await response.json();
                displayResults(results);
            } else {
                alert('Error fetching results. Please try again.');
            }
        }

        function displayResults(results) {
            const resultsContainer = document.createElement('div');
            resultsContainer.classList.add('container');

            if (results.length > 0) {
                let tableHTML = `
                    <h2>Results</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>S.No</th>
                                <th>Subject Code</th>
                                <th>Subject Name</th>
                                <th>Internals</th>
                                <th>Externals (Grades)</th>
                                <th>Credits</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                results.forEach((result, index) => {
                    tableHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${result.subjectCode}</td>
                            <td>${result.subjectName}</td>
                            <td>${result.internals}</td>
                            <td>${result.externals}</td>
                            <td>${result.credits}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                    <button onclick="window.location.reload()">Go Back</button>
                `;
                resultsContainer.innerHTML = tableHTML;
            } else {
                resultsContainer.innerHTML = `
                    <h2>No Results Found</h2>
                    <button onclick="window.location.reload()">Go Back</button>
                `;
            }

            document.body.innerHTML = ''; // Clear current content
            document.body.appendChild(resultsContainer); // Display results
        }
    </script>
</head>
<body>
    <h1>ECET-PORTAL</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" required><br>
            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">Select</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select><br>
            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">Select</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
            </select><br>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>
</body>
</html>
