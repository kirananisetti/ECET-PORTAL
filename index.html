<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET PORTAL</title>
    <style>
        /* General styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            color: #333;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        h1 {
            color: #0056b3;
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label, select, input, button {
            margin-bottom: 15px;
        }

        button {
            padding: 12px;
            background: #0056b3;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease-in-out;
        }

        button:hover {
            background: #004080;
        }

        .results {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ccc;
            text-align: left;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
    <script>
        // JSON data from the backend
        const backendData = [
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022021",
                "subject_name": "PYTHON PROGRAMMING",
                "internals": 24,
                "grade": "F",
                "credits": 0
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022022",
                "subject_name": "DIGITAL ELECTRONICS",
                "internals": 24,
                "grade": "D",
                "credits": 3
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022023",
                "subject_name": "POWER SYSTEM-I",
                "internals": 24,
                "grade": "D",
                "credits": 3
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022024",
                "subject_name": "INDUCTION AND SYNCHRONOUS MACHINES",
                "internals": 24,
                "grade": "F",
                "credits": 0
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022025",
                "subject_name": "PYTHON PROGRAMMING LAB",
                "internals": 14,
                "grade": "A+",
                "credits": 1.5
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022026",
                "subject_name": "INDUCTION AND SYNCHRONOUS MACHINES LAB",
                "internals": 15,
                "grade": "A+",
                "credits": 1.5
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022027",
                "subject_name": "DIGITAL ELECTRONICS LAB",
                "internals": 13,
                "grade": "A+",
                "credits": 1.5
            },
            {
                "roll_number": "23JD5A0201",
                "subject_code": "R2022028",
                "subject_name": "IOT APPLICATIONS OF ELECTRICAL ENGINEERING",
                "internals": 0,
                "grade": "A+",
                "credits": 2
            }
        ];

        function handleSubmit(event) {
            event.preventDefault();

            const rollNumber = document.getElementById('roll-number').value.toUpperCase();
            const results = backendData.filter(record => record.roll_number === rollNumber);

            if (results.length === 0) {
                alert("No results found for Roll Number: " + rollNumber);
                return;
            }

            let tableRows = results.map(record => `
                <tr>
                    <td>${record.subject_code}</td>
                    <td>${record.subject_name}</td>
                    <td>${record.internals}</td>
                    <td>${record.grade}</td>
                    <td>${record.credits}</td>
                </tr>
            `).join('');

            const resultsHTML = `
                <h2>Results for ${rollNumber}</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Subject Code</th>
                            <th>Subject Name</th>
                            <th>Internals</th>
                            <th>Grade</th>
                            <th>Credits</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
                <button onclick="window.location.reload()">Go Back</button>
            `;

            document.body.innerHTML = resultsHTML;
        }
    </script>
</head>
<body>
    <h1>ECET PORTAL</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" required>
            <button type="submit">Get Results</button>
        </form>
    </div>
    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>
</body>
</html>
