<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET Results Portal</title>
    <style>
        /* Styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin: 50px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        input, select, button {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 100%;
            max-width: 400px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #fcb69f;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #f58a6e;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #fcb69f;
            color: white;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>ECET Results Portal</h1>
    <div class="container">
        <form id="resultsForm">
            <input type="text" id="rollNumber" placeholder="Roll Number (e.g., 23JD5A0201)" required>
            <select id="year" required>
                <option value="">Select Year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
            <select id="semester" required>
                <option value="">Select Semester</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
            </select>
            <button type="submit">Get Results</button>
        </form>
        <div id="resultsContainer" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>Subject Code</th>
                        <th>Subject Name</th>
                        <th>Internals</th>
                        <th>Externals</th>
                        <th>Credits</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
        <p id="errorMessage" class="error"></p>
    </div>

    <script>
        document.getElementById('resultsForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const rollNumber = document.getElementById('rollNumber').value.trim().toUpperCase();
            const year = document.getElementById('year').value;
            const semester = document.getElementById('semester').value;

            try {
                const response = await fetch('backend.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ rollNumber, year, semester })
                });

                if (!response.ok) throw new Error('Failed to fetch data from the server.');

                const data = await response.json();

                if (data.status === 'success') {
                    const resultsBody = document.getElementById('resultsBody');
                    resultsBody.innerHTML = ''; // Clear previous results

                    data.results.forEach(result => {
                        resultsBody.innerHTML += `
                            <tr>
                                <td>${result.subjectCode}</td>
                                <td>${result.subjectName}</td>
                                <td>${result.internals}</td>
                                <td>${result.externals}</td>
                                <td>${result.credits}</td>
                            </tr>
                        `;
                    });

                    document.getElementById('resultsContainer').style.display = 'block';
                    document.getElementById('errorMessage').textContent = '';
                } else {
                    throw new Error(data.message || 'No results found.');
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message;
                document.getElementById('resultsContainer').style.display = 'none';
            }
        });
    </script>
</body>
</html>
