<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELURU COLLEGE OF ENGINEERING AND TECHNOLOGY</title>
    <style>
        /* Updated Styling */
        body {
            font-family: 'Courier New', monospace; /* Changed font */
            background: linear-gradient(to right, #85FFBD, #FFFB7D); /* New gradient background */
            text-align: center;
            color: #222; /* Darker text color */
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9); /* More opaque container */
            border-radius: 15px; /* Increased border radius */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3); /* More prominent shadow */
            display: inline-block;
        }

        input, select, button {
            margin: 10px;
            padding: 12px; /* Increased padding */
            font-size: 18px; /* Larger font size */
            border-radius: 8px; /* More rounded corners */
            border: 2px solid #ddd; /* Thicker border */
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px #72c6ff; /* Blue glow on focus */
            border: 2px solid #007bff; /* Blue border on focus */
        }

        button {
            background-color: #007bff; /* Blue button */
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #0056b3; /* Darker blue on hover */
            transform: scale(1.05); /* Slight zoom effect */
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #444; /* Slightly darker footer text */
        }

        h1 {
            color: #0056b3; /* Blue heading */
            font-size: 36px; /* Increased font size */
            text-transform: uppercase; /* Uppercase text */
            letter-spacing: 2px; /* Added spacing between letters */
        }
    </style>
    <script>
        // JavaScript remains unchanged
        function toUpperCaseInput(event) {
            const input = event.target;
            input.value = input.value.toUpperCase(); // Convert to uppercase
        }

        function handleSubmit(event) {
            event.preventDefault(); // Prevent form submission
            const rollNumber = document.getElementById('roll-number').value;
            const year = document.getElementById('year').value;
            const semester = document.getElementById('semester').value;

            const resultPage = `
                <div style="text-align: center; margin-top: 50px;">
                    <h2>Results</h2>
                    <p><strong>Roll Number:</strong> ${rollNumber}</p>
                    <p><strong>Year:</strong> ${year}</p>
                    <p><strong>Semester:</strong> ${semester}</p>
                    <button onclick="window.location.reload()">Go Back</button>
                </div>
            `;
            document.body.innerHTML = resultPage;
        }
    </script>
</head>
<body>
    <h1>ECET-PORTAL</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" oninput="toUpperCaseInput(event)" required><br>
            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">Select</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select><br>
            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">Select</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
            </select><br>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>
</body>
</html>
