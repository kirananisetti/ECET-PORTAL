<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET-PORTAL ELURU COLLEGE OF ENGINEERING AND TECHNOLOGY </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5dc;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        input, select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>College Administrative System</h1>
    <div class="container">
        <form action="#" method="post">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" required><br>
            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">Select</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select><br>
            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">Select</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
            </select><br>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>
</body>
</html>
