<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Portal</title>
    <style>
        /* Add your existing styles here */
    </style>
    <script>
        async function handleSubmit(event) {
            event.preventDefault();
            const rollNumber = document.getElementById('roll-number').value.toUpperCase();

            try {
                // Fetch data from JSON
                const response = await fetch('data.json');
                const data = await response.json();

                // Filter results by roll number
                const results = data.filter(item => item.roll_number === rollNumber);

                // Display results
                const container = document.getElementById('result-container');
                if (results.length === 0) {
                    container.innerHTML = `<p>No results found for Roll Number: ${rollNumber}</p>`;
                } else {
                    let resultHTML = `<h2>Results for Roll Number: ${rollNumber}</h2><table border="1">
                        <tr>
                            <th>Subject Code</th>
                            <th>Subject Name</th>
                            <th>Internals</th>
                            <th>Grade</th>
                            <th>Credits</th>
                        </tr>`;
                    results.forEach(result => {
                        resultHTML += `<tr>
                            <td>${result.subject_code}</td>
                            <td>${result.subject_name}</td>
                            <td>${result.internals}</td>
                            <td>${result.grade}</td>
                            <td>${result.credits}</td>
                        </tr>`;
                    });
                    resultHTML += `</table>`;
                    container.innerHTML = resultHTML;
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>
</head>
<body>
    <h1>Results Portal</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" required>
            <button type="submit">Search</button>
        </form>
    </div>
    <div id="result-container" class="container"></div>
</body>
</html>
