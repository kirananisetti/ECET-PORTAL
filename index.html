<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET-PORTAL</title>
    <style>
        /* General Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #ffecd2, #fcb69f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin: 20px 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px; /* Adjusted for desktop */
            text-align: center;
        }

        label {
            font-size: 1rem;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #f58a6e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #d9765b;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f58a6e;
            color: white;
        }

        td {
            background-color: #fff;
            color: #555;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }

        /* Responsive Design */
        @media (min-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .container {
                max-width: 700px;
                padding: 30px;
            }

            label {
                font-size: 1.2rem;
            }

            input, select {
                font-size: 1.1rem;
                padding: 12px;
            }

            button {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <h1>ECET-PORTAL</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" required><br>
            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">Select</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select><br>
            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">Select</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
            </select><br>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div id="results" class="container" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Subject Code</th>
                    <th>Subject Name</th>
                    <th>Internals</th>
                    <th>Externals (Grades)</th>
                    <th>Credits</th>
                </tr>
            </thead>
            <tbody id="results-body">
            </tbody>
        </table>
    </div>

    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const rollNumber = document.getElementById('roll-number').value.toUpperCase();
            const year = document.getElementById('year').value;
            const semester = document.getElementById('semester').value;

            // Sample JSON Data
            const data = [
                {
                    "rollNumber": "23JD5A0201",
                    "year": "2",
                    "semester": "1",
                    "subjectCode": "CS101",
                    "subjectName": "Mathematics 4",
                    "internals": "18",
                    "externals": "C",
                    "credits": "3"
                },
                {
                    "rollNumber": "23JD5A0201",
                    "year": "2",
                    "semester": "1",
                    "subjectCode": "MA101",
                    "subjectName": "Power Systems 2",
                    "internals": "16",
                    "externals": "B",
                    "credits": "3"
                },
                {
                    "rollNumber": "23JD5A0201",
                    "year": "2",
                    "semester": "1",
                    "subjectCode": "EE201",
                    "subjectName": "Electrical Engineering Basics",
                    "internals": "17",
                    "externals": "D",
                    "credits": "3"
                }
            ];

            const results = data.filter(item => item.rollNumber === rollNumber && item.year === year && item.semester === semester);

            if (results.length > 0) {
                const resultsBody = document.getElementById('results-body');
                resultsBody.innerHTML = ''; // Clear previous results

                results.forEach((result, index) => {
                    const row = `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${result.subjectCode}</td>
                            <td>${result.subjectName}</td>
                            <td>${result.internals}</td>
                            <td>${result.externals}</td>
                            <td>${result.credits}</td>
                        </tr>
                    `;
                    resultsBody.innerHTML += row;
                });

                document.getElementById('results').style.display = 'block';
            } else {
                alert('No results found for the given details.');
            }
        }
    </script>
</body>
</html>
