<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET Results</title>
    <style>
        /* మీ స్టైల్‌లు ఇక్కడ ఉన్నాయి */
    </style>
    <script>
        // JSON ఫైల్ నుండి డేటాను లోడ్ చేయడం
        async function loadResults() {
            const response = await fetch('results.json'); // JSON ఫైల్ పాత్
            const data = await response.json();
            return data;
        }

        // ఫారమ్ సబ్మిట్ హ్యాండ్లింగ్
        async function handleSubmit(event) {
            event.preventDefault();
            const rollNumber = document.getElementById('roll-number').value.toUpperCase();
            const year = document.getElementById('year').value;
            const semester = document.getElementById('semester').value;

            const results = await loadResults();
            const filteredResults = results.filter(result => result.roll_number === rollNumber);

            // రిజల్ట్ ప్రదర్శన
            const resultContainer = document.getElementById('result-container');
            if (filteredResults.length > 0) {
                let resultHTML = `<h2>Results for Roll Number: ${rollNumber}</h2>`;
                resultHTML += `
                    <table border="1" style="width: 100%; text-align: center;">
                        <thead>
                            <tr>
                                <th>Subject Code</th>
                                <th>Subject Name</th>
                                <th>Internals</th>
                                <th>Grade</th>
                                <th>Credits</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                filteredResults.forEach(item => {
                    resultHTML += `
                        <tr>
                            <td>${item.subject_code}</td>
                            <td>${item.subject_name}</td>
                            <td>${item.internals}</td>
                            <td>${item.grade}</td>
                            <td>${item.credits}</td>
                        </tr>
                    `;
                });

                resultHTML += `
                        </tbody>
                    </table>
                    <button onclick="window.location.reload()">Go Back</button>
                `;
                resultContainer.innerHTML = resultHTML;
            } else {
                resultContainer.innerHTML = `<p>No results found for Roll Number: ${rollNumber}</p>`;
            }
        }
    </script>
</head>
<body>
    <h1>ECET Results Portal</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="roll-number">Roll Number:</label>
            <input type="text" id="roll-number" name="roll-number" required><br>
            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">Select</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select><br>
            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">Select</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
            </select><br>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div id="result-container" class="container" style="margin-top: 20px;"></div>
</body>
</html>
