<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELURU COLLEGE OF ENGINEERING AND TECHNOLOGY</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }

        input, select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 8px #ffa07a;
            border: 1px solid #ff7f50;
        }

        button {
            background-color: #fcb69f;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #f58a6e;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }

        .results-container {
            margin-top: 20px;
            text-align: left;
            display: inline-block;
        }
    </style>
    <script>
        async function handleSubmit(event) {
            event.preventDefault();
            const year = document.getElementById('year').value;
            const semester = document.getElementById('semester').value;

            try {
                const response = await fetch(`http://127.0.0.1:5000/get_results?year=${year}&semester=${semester}`);
                const data = await response.json();

                if (data.status === "success") {
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = `<h2>Results for ${year}-${semester}</h2>`;
                    data.data.forEach(result => {
                        resultsContainer.innerHTML += `
                            <p><strong>Subject:</strong> ${result.subject} | 
                            <strong>Grade:</strong> ${result.grade} | 
                            <strong>Credits:</strong> ${result.credits}</p>`;
                    });
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error("Error fetching results:", error);
                alert("Failed to fetch results. Please try again.");
            }
        }
    </script>
</head>
<body>
    <h1>ECET-PORTAL</h1>
    <div class="container">
        <form onsubmit="handleSubmit(event)">
            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">Select</option>
                <option value="2">2nd Year</option>
                <!-- Add more years as needed -->
            </select><br>
            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">Select</option>
                <option value="1">1st Semester</option>
                <!-- Add more semesters as needed -->
            </select><br>
            <button type="submit">Submit</button>
        </form>
        <div id="results" class="results-container"></div>
    </div>
    <div class="footer">
        © Designed, Developed, and Maintained by the Department of E.E.E
    </div>
</body>
</html>
